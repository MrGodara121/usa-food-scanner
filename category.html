<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="category-title">Category - USA Food Scanner</title>
    <meta name="description" id="category-description" content="Browse products by category with health scores and micronutrients">
    <link rel="canonical" href="" id="canonical-url">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
    <div id="app">
        <header class="glass-header" id="header">
            <div class="logo">
                <span class="logo-icon">🍏</span>
                <span class="logo-text">FoodScan</span>
            </div>
            <nav class="desktop-nav" id="desktop-nav"></nav>
            <div class="header-right">
                <div id="user-menu" class="user-menu"></div>
                <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            </div>
        </header>
        <div class="mobile-nav" id="mobile-nav"></div>

        <main id="main-content">
            <div class="container">
                <!-- Category Header -->
                <div class="category-header" id="category-header"></div>
                
                <!-- Filter Bar -->
                <div class="filter-bar" id="filter-bar">
                    <select id="sort-select" class="filter-select">
                        <option value="popular">Most Popular</option>
                        <option value="score-high">Health Score: High to Low</option>
                        <option value="score-low">Health Score: Low to High</option>
                        <option value="newest">Newest First</option>
                    </select>
                    
                    <div class="score-filters">
                        <button class="filter-btn active" data-score="all">All</button>
                        <button class="filter-btn" data-score="healthy">Healthy (80+)</button>
                        <button class="filter-btn" data-score="medium">Medium (40-79)</button>
                        <button class="filter-btn" data-score="low">Low (0-39)</button>
                    </div>
                </div>
                
                <!-- Products Grid -->
                <div id="products-grid" class="products-grid"></div>
                
                <!-- Pagination -->
                <div id="pagination" class="pagination"></div>
            </div>
        </main>

        <footer id="footer" class="footer"></footer>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
