<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - USA Food Scanner</title>
    <meta name="description" content="Login to your USA Food Scanner account">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
    <div id="app">
        <header class="glass-header" id="header">
            <div class="logo">
                <span class="logo-icon">🍏</span>
                <span class="logo-text">FoodScan</span>
            </div>
            <nav class="desktop-nav" id="desktop-nav"></nav>
            <div class="header-right">
                <div id="user-menu" class="user-menu"></div>
                <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            </div>
        </header>
        <div class="mobile-nav" id="mobile-nav"></div>

        <main id="main-content">
            <div class="container">
                <div class="auth-container">
                    <div class="auth-tabs">
                        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                        <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
                    </div>
                    
                    <!-- Login Form -->
                    <div id="login-form" class="auth-form active">
                        <h2>Welcome Back</h2>
                        
                        <button onclick="loginWithGoogle()" class="btn-google">
                            <img src="https://www.google.com/favicon.ico" alt="Google" width="20" height="20">
                            Continue with Google
                        </button>
                        
                        <div class="divider">or</div>
                        
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="login-email">Email</label>
                                <input type="email" id="login-email" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="login-password">Password</label>
                                <input type="password" id="login-password" required>
                            </div>
                            
                            <div class="form-options">
                                <label class="checkbox-label">
                                    <input type="checkbox"> Remember me
                                </label>
                                <a href="/forgot-password">Forgot Password?</a>
                            </div>
                            
                            <button type="submit" class="btn-primary btn-block">Login</button>
                        </form>
                    </div>
                    
                    <!-- Signup Form -->
                    <div id="signup-form" class="auth-form">
                        <h2>Create Account</h2>
                        
                        <button onclick="loginWithGoogle()" class="btn-google">
                            <img src="https://www.google.com/favicon.ico" alt="Google" width="20" height="20">
                            Sign up with Google
                        </button>
                        
                        <div class="divider">or</div>
                        
                        <form onsubmit="handleSignup(event)">
                            <div class="form-group">
                                <label for="signup-name">Full Name</label>
                                <input type="text" id="signup-name" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="signup-email">Email</label>
                                <input type="email" id="signup-email" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="signup-password">Password</label>
                                <input type="password" id="signup-password" required>
                                <small>Minimum 8 characters</small>
                            </div>
                            
                            <div class="form-group">
                                <label for="signup-confirm">Confirm Password</label>
                                <input type="password" id="signup-confirm" required>
                            </div>
                            
                            <div class="form-checkbox">
                                <label class="checkbox-label">
                                    <input type="checkbox" required> I agree to the 
                                    <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>
                                </label>
                            </div>
                            
                            <button type="submit" class="btn-primary btn-block">Create Account</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <footer id="footer" class="footer"></footer>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
