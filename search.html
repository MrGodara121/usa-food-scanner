<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products - USA Food Scanner</title>
    <meta name="description" content="Search thousands of food products with health scores, micronutrients, and voice search">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
    <div id="app">
        <header class="glass-header" id="header">
            <div class="logo">
                <span class="logo-icon">🍏</span>
                <span class="logo-text">FoodScan</span>
            </div>
            <nav class="desktop-nav" id="desktop-nav"></nav>
            <div class="header-right">
                <div id="user-menu" class="user-menu"></div>
                <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            </div>
        </header>
        <div class="mobile-nav" id="mobile-nav"></div>

        <main id="main-content">
            <div class="container">
                <!-- Search Header -->
                <div class="search-header">
                    <h1>Search Products</h1>
                    
                    <!-- Search Form -->
                    <form id="search-form" class="search-form" onsubmit="return false;">
                        <div class="search-wrapper">
                            <input type="search" id="search-input" placeholder="Search products, brands, ingredients..." autocomplete="off">
                            <button type="button" onclick="startVoiceSearch()" class="voice-btn" title="Voice Search">🎤</button>
                            <button type="submit" onclick="performSearch()">🔍</button>
                        </div>
                        
                        <!-- Search Filters -->
                        <div class="search-filters">
                            <label class="filter-option">
                                <input type="radio" name="type" value="all" checked> All
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="type" value="products"> Products
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="type" value="categories"> Categories
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="type" value="ingredients"> Ingredients
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="type" value="blog"> Blog
                            </label>
                        </div>
                    </form>
                </div>
                
                <!-- Voice Search Status -->
                <div id="voice-status" class="voice-status" style="display: none;">
                    🎤 Listening... Speak now
                </div>
                
                <!-- Search Results -->
                <div id="search-results" class="search-results">
                    <div class="results-header" id="results-header"></div>
                    <div id="results-grid" class="products-grid"></div>
                </div>
            </div>
        </main>

        <footer id="footer" class="footer"></footer>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
