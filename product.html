<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="product-title">Product Details - USA Food Scanner</title>
    <meta name="description" id="product-description" content="Check product health score, ingredients, and nutrition facts">
    <link rel="canonical" href="" id="canonical-url">
    
    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:url" id="og-url" content="">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/product.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
    <div id="app">
        <header class="glass-header" id="header"></header>
        <div class="mobile-nav" id="mobile-nav"></div>

        <main id="main-content">
            <div class="container">
                <!-- Breadcrumbs -->
                <nav class="breadcrumbs" id="breadcrumbs"></nav>
                
                <!-- Product Header -->
                <div class="product-header" id="product-header"></div>
                
                <!-- Ingredients Section -->
                <section class="ingredients-section" id="ingredients-section"></section>
                
                <!-- Nutrition Tabs (Macros + Micronutrients) -->
                <section class="nutrition-tabs-section" id="nutrition-tabs-section">
                    <div class="nutrition-tabs">
                        <button class="tab-btn active" onclick="showTab('macros')">Macros</button>
                        <button class="tab-btn" onclick="showTab('vitamins')">Vitamins</button>
                        <button class="tab-btn" onclick="showTab('minerals')">Minerals</button>
                    </div>
                    
                    <div id="macros-tab" class="tab-content active">
                        <div class="nutrition-table" id="macros-table"></div>
                    </div>
                    
                    <div id="vitamins-tab" class="tab-content">
                        <div class="nutrient-grid" id="vitamins-grid"></div>
                    </div>
                    
                    <div id="minerals-tab" class="tab-content">
                        <div class="nutrient-grid" id="minerals-grid"></div>
                    </div>
                </section>
                
                <!-- Healthy Alternatives -->
                <section class="alternatives-section" id="alternatives-section"></section>
                
                <!-- Reviews Section -->
                <section class="reviews-section" id="reviews-section">
                    <h2>Customer Reviews</h2>
                    <div id="reviews-list" class="reviews-list"></div>
                    
                    <div class="add-review" id="add-review">
                        <h3>Write a Review</h3>
                        <div class="rating-select">
                            <span class="star" onclick="setRating(1)">★</span>
                            <span class="star" onclick="setRating(2)">★</span>
                            <span class="star" onclick="setRating(3)">★</span>
                            <span class="star" onclick="setRating(4)">★</span>
                            <span class="star" onclick="setRating(5)">★</span>
                        </div>
                        <textarea id="review-text" placeholder="Share your thoughts..." rows="4"></textarea>
                        <button onclick="submitReview()" class="btn-primary">Submit Review</button>
                    </div>
                </section>
                
                <!-- Related Articles -->
                <section class="related-articles" id="related-articles"></section>
                
                <!-- Premium Lock (if not premium) -->
                <div id="premium-lock" class="premium-lock" style="display: none;">
                    <div class="lock-content">
                        <span class="lock-icon">🔒</span>
                        <h3>Premium Feature</h3>
                        <p>Upgrade to see detailed nutrition analysis, buy links, and PDF reports</p>
                        <a href="/premium" class="btn-primary">Upgrade for $9.99/month</a>
                    </div>
                </div>
            </div>
        </main>

        <footer id="footer" class="footer"></footer>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
